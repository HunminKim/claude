name: smoke

# 하네스 행위 검증(tests/smoke_test.py)을 두 OS 에서 자동 실행.
# - ubuntu: 권위 신호 (CLAUDE.md "커밋 전 smoke 필수"를 CI 로 강제)
# - windows + Git Bash: 실제 Windows 훅 런타임(sh + 네이티브 python)을 그대로 재현하는 카나리아.
#   Claude Code 는 Windows 에서 훅을 Git Bash 로 띄우고 그 안의 python3 는 네이티브 python 이라
#   os.sep='\\'·CRLF 가 그대로 노출된다 — 이 잡이 그 환경을 직접 검증한다.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    defaults:
      run:
        # windows-latest 의 bash 는 Git Bash → 실제 훅 런타임과 동일.
        shell: bash
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: smoke_test
        run: python tests/smoke_test.py
      # CLAUDE.md "ruff 잔존 오류는 같은 PR 안에서 fix" 를 CI 로 강제 —
      # ruff 미설치 로컬(PostToolUse 훅 graceful skip)에서 온 lint 회귀 차단.
      # 템플릿(placeholder 코드)은 로컬 훅과 동일하게 대상 외.
      - name: ruff
        if: matrix.os == 'ubuntu-latest'
        run: |
          pip install ruff
          ruff check . --exclude 'plugins/*/skills/*/assets/templates'
