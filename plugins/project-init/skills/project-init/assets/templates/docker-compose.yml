# docker-compose.yml — {{PROJECT_NAME}} 멀티서비스 스택 (골격 스캐폴드)
#
# 실제 서비스에 맞게 수정한다. 미사용 서비스 블록은 삭제한다 (placeholder 그대로 두지 않는다).
# 각 서비스 Dockerfile 작성·이미지 최적화는 @infra 에이전트에 위임한다.
#
# 제어 (호스트 네이티브 Claude 가 docker CLI 로 — 스택을 컨테이너 밖에서 조종):
#   docker compose up -d           # 전체 기동
#   docker compose up -d backend   # 특정 서비스만
#   docker compose logs -f vllm    # 로그 추적
#   docker compose down            # 정리
#
# 비밀값(POSTGRES_PASSWORD 등)은 같은 폴더 .env 에 두고 git 커밋 금지 (.gitignore 가 차단).

services:
  # ── 프론트엔드 ──────────────────────────────
  frontend:
    build: ./frontend              # Dockerfile 위치 (@infra 작성)
    ports:
      - "3000:3000"
    depends_on: [backend]
    networks: [appnet]

  # ── 백엔드 (API) ────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://app:${DB_PASSWORD:-app}@db:5432/app
      - VLLM_URL=http://vllm:8000/v1
    depends_on: [db, vllm]
    networks: [appnet]

  # ── vLLM 추론 서버 (GPU) ────────────────────
  # ⚠️ 환경 호환 preflight (pull 전 필수 — mock 테스트로는 못 잡힘):
  #   1. 호스트 드라이버 CUDA 확인:  nvidia-smi  → "CUDA Version: X.Y"
  #   2. 이미지 CUDA 요구 ↔ 호스트 드라이버 대조. 부동 :latest 는 어느 날 CUDA 요구가
  #      올라가면 조용히 깨지므로 **태그를 핀**한다 (아래 PINNED_TAG).
  #   3. 컨슈머 GPU(GeForce/RTX) 배포 시: vLLM 이미지는 CUDA forward-compat libcuda 를
  #      번들하는데 컨슈머 GPU 는 forward-compat 미지원 → 호스트 드라이버 < 번들 compat 면
  #      `Error 804` 기동 실패. 해결: 파생 Dockerfile 에서 compat 디렉토리 제거 후 빌드 —
  #        FROM vllm/vllm-openai:PINNED_TAG
  #        RUN rm -rf /usr/local/cuda*/compat   # 호스트 네이티브 libcuda + minor-version compat 사용
  #      (legacy nvidia-container-toolkit 모드에선 volume-mask 가 toolkit hook 을 깨므로 파생 이미지 strip 이 정답)
  vllm:
    image: vllm/vllm-openai:PINNED_TAG   # ← 핀 태그로 교체 (위 preflight 후). 부동 :latest 금지
    command: ["--model", "YOUR_MODEL_HERE"]   # 예: meta-llama/Llama-3.1-8B-Instruct
    ports:
      - "8001:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    deploy:                          # GPU 패스스루 (NVIDIA Container Toolkit 필요)
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all             # 특정 GPU 만: 대신 device_ids: ["0"]
              capabilities: [gpu]
    networks: [appnet]

  # ── DB ──────────────────────────────────────
  db:
    image: postgres:16              # 공식 이미지 — Dockerfile 불필요
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=${DB_PASSWORD:-app}   # 운영은 .env 로 주입
      - POSTGRES_DB=app
    volumes:
      - db_data:/var/lib/postgresql/data
    networks: [appnet]

networks:
  appnet:
    driver: bridge

volumes:
  db_data:
  hf_cache:
